<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Many Flower Arts - AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background-image: 
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        url('Fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    model-viewer {
      width: 100%;
      height: 75vh;
    }

    /* Esconde botão AR padrão */
    model-viewer::part(default-ar-button) {
      display: none;
    }

    /* BOTÃO GRANDE MOBILE */
    .ar-button {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      padding: 22px;
      font-size: 20px;
      font-weight: bold;
      background-color: #1f1f1f;
      color: white;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .ar-button:active {
      transform: scale(0.97);
    }

    /* Desktop */
    @media (min-width: 768px) {
      .ar-button {
        position: relative;
        width: 400px;
        left: auto;
        bottom: auto;
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>

  <model-viewer
    id="model"
    src="white+orchid+bouquet+3d+model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>

  <button class="ar-button" onclick="activateAR()">
    Ver em Realidade Aumentada
  </button>

  <script>
    function activateAR() {
      document.getElementById('model').activateAR();
    }
  </script>

</body>
</html>
