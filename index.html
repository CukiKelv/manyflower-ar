<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Many Flower Arts - AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100dvh;
      overflow: hidden; /* 🚫 Remove scroll */
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;

      background-image: url('Fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* CARD CENTRAL */
    .card {
      width: 92%;
      max-width: 500px;
      height: 78dvh; /* Ajustado para caber com botão */
      background: rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }

    .logo {
      width: 140px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    model-viewer {
      width: 100%;
      flex: 1;
    }

    model-viewer::part(default-ar-button) {
      display: none;
    }

    /* BOTÃO FIXO */
    .ar-button {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      background-color: #1f1f1f;
      color: white;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .ar-button:active {
      transform: scale(0.97);
    }

    /* Desktop */
    @media (min-width: 768px) {
      html, body {
        overflow: auto;
      }

      .ar-button {
        position: relative;
        width: 400px;
        left: auto;
        bottom: auto;
        margin-top: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="card">
    <img src="Logo.webp" alt="MF Arts Logo" class="logo">

    <model-viewer
      id="model"
      src="FroggyPotfix.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1">
    </model-viewer>
  </div>

  <button class="ar-button" onclick="activateAR()">
    Ver em Realidade Aumentada
  </button>

  <script>
    function activateAR() {
      document.getElementById('model').activateAR();
    }
  </script>

</body>
</html>
