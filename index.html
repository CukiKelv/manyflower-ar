<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Many Flower Arts - AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Agora o fundo é só a imagem */
      background-image: url('Fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* QUADRADO BRANCO TRANSPARENTE */
    .card {
      width: 92%;
      max-width: 500px;
      height: 85vh;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }

    /* LOGO */
    .logo {
      width: 150px;
      margin-bottom: 10px;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    model-viewer::part(default-ar-button) {
      display: none;
    }

    /* BOTÃO MOBILE GRANDE */
    .ar-button {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      padding: 22px;
      font-size: 20px;
      font-weight: bold;
      background-color: #1f1f1f;
      color: white;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .ar-button:active {
      transform: scale(0.97);
    }

    /* Desktop */
    @media (min-width: 768px) {
      .ar-button {
        position: relative;
        width: 400px;
        left: auto;
        bottom: auto;
        margin-top: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="card">
    <img src="Logo.webp" alt="MF Arts Logo" class="logo">

    <model-viewer
      id="model"
      src="FroggyPotfix.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1">
    </model-viewer>
  </div>

  <button class="ar-button" onclick="activateAR()">
    Ver em Realidade Aumentada
  </button>

  <script>
    function activateAR() {
      document.getElementById('model').activateAR();
    }
  </script>

</body>
</html>
