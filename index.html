<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Many Flower Arts - AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* Fundo com leve camada branca elegante */
      background-image: 
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        url('Fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    model-viewer {
      width: 100%;
      max-width: 600px;
      height: 75vh;
    }

    /* Esconde botão AR padrão */
    model-viewer::part(default-ar-button) {
      display: none;
    }

    /* Botão personalizado */
    .ar-button {
      width: 95%;
      max-width: 500px;
      padding: 20px;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: bold;
      background-color: #1f1f1f;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .ar-button:hover {
      background-color: #333;
    }

  </style>
</head>

<body>

  <model-viewer
    id="model"
    src="white+orchid+bouquet+3d+model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>

  <button class="ar-button" onclick="activateAR()">
    Ver em Realidade Aumentada
  </button>

  <script>
    function activateAR() {
      document.getElementById('model').activateAR();
    }
  </script>

</body>
</html>
