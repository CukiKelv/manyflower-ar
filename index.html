<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Many Flower Arts - AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  background-image: url('Fundo.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Camada escura suave para elegância */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(2px);
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

.logo {
  margin-top: 10px;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 3px;
}

.logo small {
  display: block;
  font-size: 14px;
  font-weight: normal;
  letter-spacing: 2px;
}

model-viewer {
  width: 100%;
  max-width: 600px;
  height: 60vh;
}

/* Esconde botão padrão */
model-viewer::part(default-ar-button) {
  display: none;
}

.texto {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 10px;
}

/* Botão grande */
.ar-button {
  display: none;
  width: 95%;
  max-width: 500px;
  padding: 22px;
  font-size: 20px;
  font-weight: bold;
  background-color: #111;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  transition: 0.3s;
  margin-bottom: 20px;
}

.ar-button:hover {
  background-color: #333;
}

/* Botão só aparece em dispositivos móveis */
<script>
const modelViewer = document.getElementById("model");
const arButton = document.querySelector(".ar-button");
const texto = document.querySelector(".texto");

if (modelViewer.canActivateAR) {
  arButton.style.display = "block";
  texto.style.display = "block";
} else {
  arButton.style.display = "none";
  texto.style.display = "none";
}

function activateAR() {
  modelViewer.activateAR();
}
</script>

</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">

  <div class="logo">
    MF
    <small>arts</small>
  </div>

  <model-viewer
    id="model"
    src="white+orchid+bouquet+3d+model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>

  <div class="texto">
    Visualize essa peça na sua casa
  </div>

  <button class="ar-button" onclick="activateAR()">
    Ver em Realidade Aumentada
  </button>

</div>

<script>
function activateAR() {
  document.getElementById('model').activateAR();
}
</script>

</body>
</html>
