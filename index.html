<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Many Flower Arts - AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100dvh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('Fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .card {
      width: 92%;
      max-width: 500px;
      height: 75dvh;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }

    .logo {
      width: 140px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    model-viewer {
      width: 100%;
      flex: 1;
    }

    model-viewer::part(default-ar-button) {
      display: none;
    }

    /* TOGGLE BUTTON */
    .toggle-container {
      margin-top: 10px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      border-radius: 34px;
      transition: .3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: .3s;
    }

    input:checked + .slider {
      background-color: #1f1f1f;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    /* BOTÃO AR */
    .ar-button {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      background-color: #1f1f1f;
      color: white;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .ar-button:active {
      transform: scale(0.97);
    }

    @media (min-width: 768px) {
      html, body {
        overflow: auto;
      }

      .ar-button {
        position: relative;
        width: 400px;
        left: auto;
        bottom: auto;
        margin-top: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="card">
    <img src="Logo.webp" alt="MF Arts Logo" class="logo">

    <model-viewer
      id="model"
      src="FroggyPotfix.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1">
    </model-viewer>

    <!-- TOGGLE -->
    <div class="toggle-container">
      <span>Sem flores</span>
      <label class="switch">
        <input type="checkbox" onchange="toggleModel(this)">
        <span class="slider"></span>
      </label>
      <span>Com flores</span>
    </div>

  </div>

  <button class="ar-button" onclick="activateAR()">
    Ver em Realidade Aumentada
  </button>

  <script>
    function activateAR() {
      document.getElementById('model').activateAR();
    }

    function toggleModel(toggle) {
      const modelViewer = document.getElementById('model');
      
      if (toggle.checked) {
        modelViewer.src = "FroggyPotOrchidBig.compressed.glb";
      } else {
        modelViewer.src = "FroggyPotfix.glb";
      }
    }
  </script>

</body>
</html>
